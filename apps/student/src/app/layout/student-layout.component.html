<div class="app-shell" [class.dark]="theme.isDark()">
  <main class="app-content">
    <router-outlet />
  </main>
  <nav class="bottom-nav">
    <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="nav-item">
      <i class="fas fa-house"></i>
      <span>მთავარი</span>
    </a>
    <a routerLink="/services" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="nav-item">
      <i class="fas fa-grip"></i>
      <span>სერვისები</span>
    </a>
    <a routerLink="/mobility" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="nav-item">
      <i class="fas fa-right-left"></i>
      <span>მობილობა</span>
    </a>
    <a routerLink="/profile" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}" class="nav-item">
      <i class="fas fa-user"></i>
      <span>პროფილი</span>
    </a>
  </nav>
</div>
