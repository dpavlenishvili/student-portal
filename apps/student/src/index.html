<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <title>სტუდენტის პორტალი</title>
  <base href="/" />

  <!-- Viewport — viewport-fit=cover for iOS notch -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- PWA theme -->
  <meta name="theme-color" content="#1e3a5f" />
  <meta name="description" content="სტუდენტის პირადი კაბინეტი" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="პორტალი" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <!-- Android / standard -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- Prevent phone number detection -->
  <meta name="format-detection" content="telephone=no" />

  <!-- FOUC prevention: apply saved theme class before Angular bootstraps -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('portal_theme');
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
