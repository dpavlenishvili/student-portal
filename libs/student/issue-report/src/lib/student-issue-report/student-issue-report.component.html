<div class="min-h-screen bg-slate-50 dark:bg-slate-900 flex flex-col">
  <div class="bg-white dark:bg-slate-800 px-4 py-3 flex items-center gap-3 shadow-sm sticky top-0 z-20 border-b border-slate-100 dark:border-slate-700">
    <a routerLink="/services" class="w-8 h-8 flex items-center justify-center text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <h1 class="text-lg font-bold text-slate-900 dark:text-white">შეფასება / ხარვეზი</h1>
  </div>

  <div class="p-5 pb-24">
    @if (submitted()) {
      <div class="mb-4 p-4 bg-green-50 dark:bg-green-900/20 border border-green-200 rounded-xl flex items-center gap-3">
        <i class="fa-solid fa-check-circle text-green-600"></i>
        <span class="text-sm text-green-700 font-medium">შეტყობინება გაგზავნილია!</span>
      </div>
    }
    <div class="bg-white dark:bg-slate-800 p-5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm space-y-4">
      <p class="text-sm text-slate-600 dark:text-slate-400 mb-2">დააფიქსირეთ ინფრასტრუქტურული ან აკადემიური ხარვეზი.</p>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">კატეგორია</label>
        <select [ngModel]="category()" (ngModelChange)="category.set($event)"
          class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg focus:outline-none focus:border-red-500 text-sm text-slate-900 dark:text-white">
          <option value="ინფრასტრუქტურა">ინფრასტრუქტურა</option>
          <option value="აკადემიური">აკადემიური პროცესი</option>
          <option value="ადმინისტრაცია">ადმინისტრაცია</option>
          <option value="სხვა">სხვა</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">აღწერა</label>
        <textarea [ngModel]="desc()" (ngModelChange)="desc.set($event)" rows="4"
          class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg focus:outline-none focus:border-red-500 text-sm resize-none text-slate-900 dark:text-white"></textarea>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">ფოტოს ატვირთვა (სურვილისამებრ)</label>
        <div class="border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-lg p-6 text-center text-slate-400 hover:bg-slate-50 transition-colors cursor-pointer">
          <i class="fa-solid fa-cloud-arrow-up text-2xl mb-2"></i>
          <p class="text-xs">დააჭირეთ ფოტოს ასატვირთად</p>
        </div>
      </div>
      <button (click)="send()" [disabled]="!category() || !desc()"
        class="w-full py-3 bg-red-600 text-white rounded-lg font-bold text-sm hover:bg-red-700 transition-colors disabled:opacity-50">
        გაგზავნა
      </button>
    </div>
  </div>
</div>
